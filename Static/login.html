<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aria Studio — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #07070e;
    --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --accent: #c9a96e;
    --accent2: #8b5cf6;
    --text: #f0ece4;
    --muted: rgba(240,236,228,0.45);
    --error: #f87171;
  }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  /* Animated background */
  .bg-canvas {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 30%, rgba(139,92,246,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 70%, rgba(201,169,110,0.14) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(99,102,241,0.08) 0%, transparent 70%);
  }

  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.35;
    animation: drift 20s ease-in-out infinite alternate;
  }
  .orb1 { width: 550px; height: 550px; background: radial-gradient(circle, rgba(139,92,246,0.7), transparent); top: -180px; left: -120px; animation-duration: 26s; }
  .orb2 { width: 420px; height: 420px; background: radial-gradient(circle, rgba(201,169,110,0.5), transparent); bottom: -110px; right: -90px; animation-duration: 19s; animation-delay: -9s; }
  .orb3 { width: 280px; height: 280px; background: radial-gradient(circle, rgba(56,189,248,0.3), transparent); top: 55%; left: 55%; animation-duration: 23s; animation-delay: -5s; }

  @keyframes drift {
    0%   { transform: translate(0, 0) scale(1); }
    33%  { transform: translate(50px, -35px) scale(1.06); }
    66%  { transform: translate(-25px, 45px) scale(0.94); }
    100% { transform: translate(35px, 12px) scale(1.03); }
  }

  /* Subtle grid */
  .grid-overlay {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(ellipse 75% 75% at 50% 50%, black 40%, transparent 100%);
  }

  /* Floating particles */
  .particle {
    position: fixed;
    width: 2px; height: 2px;
    border-radius: 50%;
    background: rgba(201,169,110,0.6);
    animation: float-up linear infinite;
    z-index: 0;
  }
  @keyframes float-up {
    0%   { opacity: 0; transform: translateY(0) scale(0); }
    10%  { opacity: 1; transform: translateY(-10px) scale(1); }
    90%  { opacity: 0.5; }
    100% { opacity: 0; transform: translateY(-120px) scale(0.5); }
  }

  .container {
    position: relative; z-index: 1;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    width: 440px;
    background: rgba(10,10,20,0.88);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 28px;
    padding: 52px 48px;
    backdrop-filter: blur(48px);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.04),
      0 50px 100px rgba(0,0,0,0.7),
      0 0 80px rgba(139,92,246,0.06),
      inset 0 1px 0 rgba(255,255,255,0.1);
    animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(32px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Logo */
  .logo-area { text-align: center; margin-bottom: 40px; }

  .logo-ring {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 72px; height: 72px;
    border-radius: 22px;
    background: linear-gradient(135deg, rgba(139,92,246,0.25), rgba(201,169,110,0.2));
    border: 1px solid rgba(139,92,246,0.3);
    margin-bottom: 18px;
    position: relative;
    animation: glow 3.5s ease-in-out infinite;
  }
  .logo-ring::before {
    content: '';
    position: absolute; inset: -1px;
    border-radius: 23px;
    background: linear-gradient(135deg, rgba(139,92,246,0.5), rgba(201,169,110,0.3), transparent);
    z-index: -1;
    animation: rotate-border 6s linear infinite;
  }
  @keyframes glow {
    0%, 100% { box-shadow: 0 0 20px rgba(139,92,246,0.3); }
    50%       { box-shadow: 0 0 40px rgba(139,92,246,0.55), 0 0 60px rgba(201,169,110,0.15); }
  }
  .logo-ring .icon { font-size: 32px; }

  .logo-title {
    font-family: 'Playfair Display', serif;
    font-size: 30px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #ffffff 30%, #c9a96e 70%, #8b5cf6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo-tagline {
    font-size: 13px;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 0.8px;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(139,92,246,0.3), rgba(201,169,110,0.2), transparent);
    margin-bottom: 34px;
  }

  /* Form */
  .form-group { margin-bottom: 20px; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: rgba(201,169,110,0.7);
    margin-bottom: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .input-wrap { position: relative; }

  .input-icon {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 15px;
    opacity: 0.45;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  input[type="text"],
  input[type="password"] {
    width: 100%;
    padding: 14px 14px 14px 44px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: all 0.22s;
  }

  input:focus {
    border-color: rgba(139,92,246,0.55);
    background: rgba(139,92,246,0.07);
    box-shadow: 0 0 0 3px rgba(139,92,246,0.14);
  }
  input:focus + .input-icon,
  .input-wrap:focus-within .input-icon { opacity: 0.8; }

  input::placeholder { color: rgba(240,236,228,0.2); }

  /* Login button */
  .btn-login {
    width: 100%;
    padding: 15px;
    margin-top: 8px;
    background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 50%, #6d28d9 100%);
    border: none;
    border-radius: 14px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.4px;
    transition: all 0.25s;
    position: relative; overflow: hidden;
    box-shadow: 0 4px 20px rgba(139,92,246,0.35);
  }

  .btn-login::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.18), transparent 60%);
    opacity: 0;
    transition: opacity 0.22s;
  }

  .btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 32px rgba(139,92,246,0.55);
  }
  .btn-login:hover::after { opacity: 1; }
  .btn-login:active { transform: translateY(0); box-shadow: 0 4px 12px rgba(139,92,246,0.3); }
  .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

  /* Error */
  .error-msg {
    background: rgba(248,113,113,0.09);
    border: 1px solid rgba(248,113,113,0.28);
    border-radius: 12px;
    padding: 11px 15px;
    font-size: 13px;
    color: #fca5a5;
    margin-top: 16px;
    display: none;
    animation: shake 0.35s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25%       { transform: translateX(-6px); }
    75%       { transform: translateX(6px); }
  }

  /* Footer note */
  .footer-note {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 28px;
    padding-top: 22px;
    border-top: 1px solid rgba(255,255,255,0.06);
    line-height: 1.6;
  }

  .footer-note .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--green, #34d399); margin-right: 6px; vertical-align: middle; animation: pulse-dot 2s ease-in-out infinite; }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.5; transform: scale(0.7); }
  }

  /* Spinner */
  .spin {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.25);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.65s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="bg-canvas"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div class="grid-overlay"></div>

<!-- Floating particles -->
<script>
  for (let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `left:${Math.random()*100}%;bottom:${Math.random()*30}%;animation-duration:${4+Math.random()*6}s;animation-delay:${Math.random()*6}s;opacity:${0.3+Math.random()*0.5}`;
    document.body.appendChild(p);
  }
</script>

<div class="container">
  <div class="card">

    <div class="logo-area">
      <div class="logo-ring"><span class="icon">🎨</span></div>
      <div class="logo-title">Aria Studio</div>
      <div class="logo-tagline">AI-Powered Art Generation</div>
    </div>

    <div class="divider"></div>

    <div class="form-group">
      <label>Username</label>
      <div class="input-wrap">
        <input type="text" id="username" placeholder="Choose a username" autocomplete="username"/>
        <span class="input-icon">👤</span>
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="Choose a password" autocomplete="current-password"/>
        <span class="input-icon">🔑</span>
      </div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      Enter the Studio ✦
    </button>

    <div class="error-msg" id="errorMsg"></div>

    <div class="footer-note">
      <span class="dot"></span>
      Enter any username &amp; password to get started
    </div>

  </div>
</div>

<script>
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  // Auto-focus username
  window.addEventListener('load', () => document.getElementById('username').focus());

  async function doLogin() {
    const btn     = document.getElementById('loginBtn');
    const err     = document.getElementById('errorMsg');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!username || !password) {
      showError('Please enter both a username and password.');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span>Opening studio…';
    err.style.display = 'none';

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
        credentials: 'include',
      });
      const data = await res.json();

      if (data.ok) {
        btn.innerHTML = '✓ Welcome, ' + username + '!';
        btn.style.background = 'linear-gradient(135deg, #059669, #047857)';
        setTimeout(() => window.location.href = '/app', 500);
      } else {
        showError(data.error || 'Something went wrong. Try again.');
        btn.disabled = false;
        btn.innerHTML = 'Enter the Studio ✦';
        btn.style.background = '';
      }
    } catch (e) {
      showError('Connection error. Is the server running?');
      btn.disabled = false;
      btn.innerHTML = 'Enter the Studio ✦';
    }
  }

  function showError(msg) {
    const err = document.getElementById('errorMsg');
    err.textContent = msg;
    err.style.display = 'block';
    err.style.animation = 'none';
    void err.offsetWidth;
    err.style.animation = 'shake 0.35s ease';
  }
</script>
</body>
</html>
